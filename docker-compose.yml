services:
  db:
      image: postgres:17
      container_name: airport_db
      restart: always
      env_file:
        - .env
      ports:
        - "5433:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: airport_api
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: