<!DOCTYPE html>
<html>
<head>
    <title>Airport AI Chat</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #0b0b0f;
            color: #f5f5f5;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: #111116;
            border-right: 1px solid #27272f;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: width 0.3s ease, padding 0.3s ease;
            overflow: hidden;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff3b3b;
            margin-bottom: 10px;
        }

        .token-box {
            background: #18181f;
            border: 1px solid #2d2d38;
            border-radius: 18px;
            padding: 12px;
        }

        .token-box label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .token-box input {
            width: 100%;
            background: #0b0b0f;
            border: 1px solid #333340;
            border-radius: 12px;
            color: white;
            padding: 10px;
            outline: none;
        }

        .btn {
            width: 100%;
            margin-top: 10px;
            padding: 11px 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff2d2d, #8b0000);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background: linear-gradient(135deg, #ff5a5a, #c40000, #ff2d2d);
            box-shadow: 0 0 18px rgba(255, 45, 45, 0.45);
            transform: translateY(-1px);
        }

        .chat-info {
            font-size: 13px;
            color: #aaa;
            background: #18181f;
            border-radius: 16px;
            padding: 12px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at top, rgba(255, 0, 0, 0.12), transparent 35%),
                #0b0b0f;
        }

        .header {
            padding: 18px 28px;
            border-bottom: 1px solid #27272f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
        }

        .status {
            font-size: 13px;
            color: #999;
        }

        .status.connected {
            color: #39ff88;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
        }

        .welcome {
            max-width: 720px;
            margin: 80px auto 30px;
            text-align: center;
            color: #ddd;
        }

        .welcome h1 {
            font-size: 34px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff4b4b, #ffffff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .welcome p {
            color: #aaa;
        }

        .message-row {
            display: flex;
            margin-bottom: 18px;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.assistant,
        .message-row.system,
        .message-row.error {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 720px;
            padding: 14px 17px;
            border-radius: 20px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: linear-gradient(135deg, #ff2d2d, #7a0000);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant .bubble {
            background: #18181f;
            border: 1px solid #2d2d38;
            color: #f1f1f1;
            border-bottom-left-radius: 6px;
        }

        .system .bubble {
            background: #20202a;
            color: #aaa;
            font-size: 13px;
        }

        .error .bubble {
            background: #3a1010;
            color: #ffb3b3;
            border: 1px solid #7a2020;
        }

        .input-area {
            padding: 20px 28px 28px;
            border-top: 1px solid #27272f;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: #18181f;
            border: 1px solid #343441;
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 8px 10px 8px 18px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.35);
        }

        .input-wrapper:focus-within {
            border-color: #ff3b3b;
            box-shadow: 0 0 18px rgba(255, 59, 59, 0.3);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            padding: 12px;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #ff2d2d, #8b0000);
            color: white;
            font-size: 20px;
            transition: 0.25s;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #ff6b6b, #c40000);
            box-shadow: 0 0 18px rgba(255, 45, 45, 0.55);
            transform: scale(1.05);
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .sidebar-toggle {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff2d2d, #8b0000);
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .sidebar-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.45);
        }

        .sidebar.collapsed {
            width: 86px;
            padding: 18px 14px;
        }

        .sidebar.collapsed .logo,
        .sidebar.collapsed .token-box,
        .sidebar.collapsed .chat-info,
        .sidebar.collapsed .chat-history {
            display: none;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
        }

        .chat-history {
            margin-top: 16px;
            background: #18181f;
            border-radius: 16px;
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }

        .chat-history h3 {
            margin-top: 0;
            color: #aaa;
            font-size: 14px;
        }

        .chat-item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: #22222c;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover {
            background: #303040;
        }

        .chat-item.active {
            background: #8b0000;
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Airport AI</div>
            <button id="sidebarToggle" class="sidebar-toggle">☰</button>
        </div>

        <div class="token-box">
            <label>JWT access token</label>
            <input id="tokenInput" type="password" placeholder="Paste token here">
            <button class="btn" onclick="connectSocket()">Connect</button>
            <button class="btn" onclick="startNewChat()">New chat</button>
        </div>

        <div class="chat-info">
            <div>Current chat:</div>
            <strong id="conversationId">none</strong>
        </div>

        <div class="chat-history">
            <h3>Chats</h3>
            <div id="chatHistory"></div>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <h2>Airport Management Assistant</h2>
            <div id="status" class="status">Disconnected</div>
        </header>

        <section id="chat" class="chat-window">
            <div class="welcome" id="welcome">
                <h1>How can I help with your flight?</h1>
                <p>Ask about flights, routes, terminals, gates, prices or bookings.</p>
            </div>
        </section>

        <div class="input-area">
            <div class="input-wrapper">
                <input id="messageInput" type="text" placeholder="Ask Airport AI...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
            <div class="hint">This assistant answers only questions related to the airport system.</div>
        </div>
    </main>

    <script>
        let socket = null;
        let currentConversationId = null;

        const chat = document.getElementById("chat");
        const tokenInput = document.getElementById("tokenInput");
        const messageInput = document.getElementById("messageInput");
        const conversationIdElement = document.getElementById("conversationId");
        const chatHistory = document.getElementById("chatHistory");
        const statusElement = document.getElementById("status");
        const welcome = document.getElementById("welcome");

        function removeWelcome() {
            if (welcome) {
                welcome.remove();
            }
        }

        function addMessage(type, text) {
            removeWelcome();

            const row = document.createElement("div");
            row.className = "message-row " + type;

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;

            row.appendChild(bubble);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
        }

        function connectSocket() {
            const token = tokenInput.value.trim();

            if (!token) {
                addMessage("error", "Token is required.");
                return;
            }

            if (socket) {
                socket.close();
            }

            const protocol =
                window.location.protocol === "https:"
                    ? "wss"
                    : "ws";

            socket = new WebSocket(
                `${protocol}://${window.location.host}/ws/chat/?token=${token}`
            );

            socket.onopen = function() {
                statusElement.textContent = "Connected";
                statusElement.classList.add("connected");

                addMessage("system", "Connected to Airport AI Chat.");

                loadConversations();
            };

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if (data.conversation_id) {
                    currentConversationId = data.conversation_id;
                    conversationIdElement.textContent = currentConversationId;

                    loadConversations();
                }

                if (data.message) {
                    addMessage(data.type || "assistant", data.message);
                }
            };

            socket.onclose = function() {
                statusElement.textContent = "Disconnected";
                statusElement.classList.remove("connected");
                addMessage("system", "WebSocket connection closed.");
            };

            socket.onerror = function() {
                addMessage("error", "WebSocket error.");
            };
        }

        async function loadConversations() {
            try {

                const token = tokenInput.value.trim();

                const response = await fetch(
                    "/api/chat/conversations/",
                    {
                        headers: {
                            Authorization: `Bearer ${token}`
                        }
                    }
                );

                const conversations = await response.json();

                chatHistory.innerHTML = "";

                conversations.forEach(chat => {

                    const item =
                        document.createElement("div");

                    item.className = "chat-item";
                    item.dataset.chatId = chat.id;

                    item.textContent =
                        chat.title?.length > 40
                            ? chat.title.slice(0, 40) + "..."
                            : chat.title || `Chat ${chat.id}`;

                    item.onclick = () => {
                        openConversation(chat.id);
                    };

                    chatHistory.appendChild(item);
                });

            } catch (error) {
                console.error(error);
            }
        }

        async function openConversation(id) {

            const token = tokenInput.value.trim();

            const response = await fetch(
                `/api/chat/conversations/${id}/`,
                {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                }
            );

            const conversation =
                await response.json();

            currentConversationId = id;

            conversationIdElement.textContent = id;

            document
                .querySelectorAll(".chat-item")
                .forEach(item => item.classList.remove("active"));

            document
                .querySelector(`[data-chat-id="${id}"]`)
                ?.classList.add("active");

            chat.innerHTML = "";

            conversation.messages.forEach(message => {

                addMessage(
                    message.role,
                    message.content
                );

            });
        }

        function startNewChat() {
            currentConversationId = null;
            conversationIdElement.textContent = "none";
            chat.innerHTML = `
                <div class="welcome" id="welcome">
                    <h1>New chat started</h1>
                    <p>Ask something about your airport system.</p>
                </div>
            `;

            loadConversations();
        }

        function sendMessage() {
            const message = messageInput.value.trim();

            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addMessage("error", "WebSocket is not connected.");
                return;
            }

            if (!message) {
                return;
            }

            const payload = {
                content: message
            };

            if (currentConversationId) {
                payload.conversation_id = currentConversationId;
            }

            addMessage("user", message);

            socket.send(JSON.stringify(payload));
            messageInput.value = "";
        }

        messageInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
        const sidebar = document.getElementById("sidebar");
        const sidebarToggle = document.getElementById("sidebarToggle");

        sidebarToggle.addEventListener("click", () => {
            sidebar.classList.toggle("collapsed");
        });

        loadConversations();
    </script>
</body>


</html>
